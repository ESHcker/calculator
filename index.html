<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="main.js" defer></script>
    <link rel="stylesheet" href="style.css">
    <title>Calculator</title>
</head>
<body>
    <h1 id="title">Calculator<h1>
    <h3 id="presentation">Simple calculator created by ESHcker</h3>
    <div id="calculatorContainer">
        <div id="displayContainer">
            <p id="display"></p>
        </div>
        <div id="buttonsContainer">
            <div id="digitsContainer">
                <div id="row">
                    <button id="digit" onclick="updateDigit(1)">1</button>
                    <button id="digit" onclick="updateDigit(2)">2</button>
                    <button id="digit" onclick="updateDigit(3)">3</button>
                    <button id="digit" onclick="updateDigit(3)">3</button>
                </div>
                <div id="row">
                    <button id="digit" onclick="updateDigit(4)">4</button>
                    <button id="digit" onclick="updateDigit(5)">5</button>
                    <button id="digit" onclick="updateDigit(6)">6</button>
                </div>
                <div id="row">
                    <button id="digit" onclick="updateDigit(7)">7</button>
                    <button id="digit" onclick="updateDigit(8)">8</button>
                    <button id="digit" onclick="updateDigit(9)">9</button>
                </div>
            </div>
            <div id="operatorsContainer">
                <button id="operatorAdd" onclick="updateOperator('+')">+</button>
                <button id="operatorSubtract" onclick="updateOperator('-')">-</button>
                <button id="operatorMultiply" onclick="updateOperator('x')">x</button>
                <button id="operatorDivide" onclick="updateOperator('/')">/</button>
                <button id="operate" onclick="operate()">=</button>
                <button id="clear" onclick="resetCalculator('All')">clear</button>
            </div>
        </div>
    </div>
</body>
</html>
